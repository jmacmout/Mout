// ── Postcard ───────────────────────────────────────────────────────────────
function Postcard({post,compact=false,likedPosts,onLike}){
  const [pulse,setPulse]=S(false);
  const liked=likedPosts.has(post.id);
  const photoH=compact?160:220;
  const handleLike=()=>{setPulse(true);setTimeout(()=>setPulse(false),200);onLike(post.id);};

  return h('div',{style:{borderRadius:20,overflow:'hidden',background:C.bgCard,boxShadow:sCard}},
    // Photo
    h('div',{style:{position:'relative',height:photoH,overflow:'hidden'}},
      h('img',{src:pic(400,photoH,post.photo||post.seed),alt:post.title,
        style:{width:'100%',height:'100%',objectFit:'cover',display:'block'}}),
      h('div',{style:{position:'absolute',inset:0,
        background:'linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 55%)'}}),
      h('div',{style:{position:'absolute',bottom:12,left:12}},h(LocationPill,{name:post.location}))
    ),
    // Body
    h('div',{style:{padding:'14px 16px'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('img',{src:pic(32,32,post.avatar),alt:'',
          style:{width:32,height:32,borderRadius:'50%',objectFit:'cover',flexShrink:0,
            border:`1.5px solid ${C.cyan}`}}),
        h('div',{style:{flex:1}},
          h('span',{style:{fontSize:13,fontWeight:700,color:C.white}},post.user)),
        h('span',{style:{fontSize:11,color:C.textMuted,marginRight:8}},'2h ago'),
        h(MoreHorizontal,{size:16,color:C.textMuted})
      ),
      h('p',{style:{fontSize:13,color:C.textSecondary,lineHeight:1.55,marginTop:9,
        display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}},
        post.caption),
      h('div',{style:{display:'flex',alignItems:'center',gap:6,marginTop:10}},
        h(Mountain,{size:12,color:C.textMuted}),
        h('span',{style:{fontSize:11,color:C.textMuted,fontWeight:500}},post.elev),
        h('span',{style:{color:C.border,fontSize:11}},'·'),
        h(Navigation,{size:12,color:C.textMuted}),
        h('span',{style:{fontSize:11,color:C.textMuted,fontWeight:500}},post.dist),
        h('span',{style:{color:C.border,fontSize:11}},'·'),
        h(Clock,{size:12,color:C.textMuted}),
        h('span',{style:{fontSize:11,color:C.textMuted,fontWeight:500}},post.dur)
      ),
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',
        marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`}},
        h('button',{onClick:handleLike,style:{display:'flex',alignItems:'center',gap:6,
          transform:pulse?'scale(1.3)':'scale(1)',transition:'transform 0.2s ease'}},
          h(Heart,{size:20,color:liked?C.danger:C.textMuted,fill:liked?C.danger:'none',strokeWidth:2}),
          h('span',{style:{fontSize:13,fontWeight:600,color:liked?C.danger:C.textMuted}},
            post.likes+(liked?1:0))
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:14}},
          h('div',{style:{display:'flex',alignItems:'center',gap:6}},
            h(MessageCircle,{size:20,color:C.textMuted,strokeWidth:2}),
            h('span',{style:{fontSize:13,fontWeight:600,color:C.textMuted}},post.comments)
          ),
          h(Bookmark,{size:20,color:C.textMuted,strokeWidth:2})
        )
      )

  );
}

// ── Map Screen ─────────────────────────────────────────────────────────────
function MapScreen({likedPosts,onLike,isActive,onPremium}){
  const containerRef=R(null);
  const mapRef=R(null);
  const markersRef=R([]);
  const dropdownRef=R(null);
  const prevToggleRef=R('visited');
  const [toggle,setToggle]=S('visited');
  const [dropdownOpen,setDropdownOpen]=S(false);
  const [selPin,setSelPin]=S(null);
  const [sheetVisible,setSheetVisible]=S(false);
  const [mapReady,setMapReady]=S(false);

  // Close dropdown when clicking outside
  E(()=>{
    const handler=e=>{if(dropdownRef.current&&!dropdownRef.current.contains(e.target))setDropdownOpen(false);};
    document.addEventListener('mousedown',handler);
    return ()=>document.removeEventListener('mousedown',handler);
  },[]);

  const handleMapType=(opt)=>{
    setDropdownOpen(false);
    if(opt.premium){onPremium();return;}
    setToggle(opt.value);
  };

  const currentOption=MAP_OPTIONS.find(o=>o.value===toggle)||MAP_OPTIONS[0];

  E(()=>{if(selPin)requestAnimationFrame(()=>setSheetVisible(true));},[selPin]);
  const closeSheet=CB(()=>{setSheetVisible(false);setTimeout(()=>setSelPin(null),350);},[]);

  const addMarkersAndRoutes=CB((map,mode)=>{
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    if(mode==='visited'||mode==='topo'){
      LOCATIONS.forEach(loc=>{
        const el=document.createElement('div');
        el.style.cssText=`
          width:44px;height:44px;border-radius:12px;overflow:hidden;
          border:2.5px solid #00CFFF;
          box-shadow:0 4px 16px rgba(0,207,255,0.35),0 2px 8px rgba(0,0,0,0.5);
          cursor:pointer;background-image:url(${pic(80,80,loc.photo)});
          background-size:cover;transition:transform 0.15s ease;
        `;
        el.addEventListener('mouseenter',()=>{el.style.transform='scale(1.12)';});
        el.addEventListener('mouseleave',()=>{el.style.transform='scale(1)';});
        el.addEventListener('click',()=>setSelPin(loc));
        markersRef.current.push(
          new window.maplibregl.Marker({element:el}).setLngLat(loc.coords).addTo(map)
        );
      });
      if(!map.getSource('trails')){
        map.addSource('trails',{type:'geojson',data:TRAILS_GEOJSON});
      }
      if(!map.getLayer('trails-layer')){
        map.addLayer({
          id:'trails-layer',type:'line',source:'trails',
          layout:{'line-join':'round','line-cap':'round'},
          paint:{'line-color':'#4A7C59','line-width':3,'line-opacity':0.85},
        });
      }
    } else if(mode==='wishlist'){
      WISHLIST_MAP_LOCS.forEach(loc=>{
        const el=document.createElement('div');
        el.style.cssText=`
          width:36px;height:36px;border-radius:50%;
          background:#F0A500;border:2.5px solid rgba(255,255,255,0.9);
          box-shadow:0 2px 12px rgba(240,165,0,0.55);
          cursor:pointer;display:flex;align-items:center;justify-content:center;
          transition:transform 0.15s ease;
        `;
        el.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="white" stroke="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
        el.addEventListener('mouseenter',()=>{el.style.transform='scale(1.15)';});
        el.addEventListener('mouseleave',()=>{el.style.transform='scale(1)';});
        markersRef.current.push(
          new window.maplibregl.Marker({element:el}).setLngLat(loc.coords).addTo(map)
        );
      });
    }
  },[]);

  E(()=>{
    if(mapRef.current) return;
    if(!containerRef.current) return;
    if(!document.querySelector('[data-ml-css]')){
      const link=document.createElement('link');
      link.rel='stylesheet';
      link.href='https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css';
      link.setAttribute('data-ml-css','1');
      document.head.appendChild(link);
    }
    const initMap=()=>{
      if(mapRef.current||!containerRef.current) return;
      const map=new window.maplibregl.Map({
        container:containerRef.current,
        style:OUTDOOR_STYLE(),
        center:[-119.5383,37.8651],
        zoom:10,pitch:0,bearing:0,attributionControl:false,
      });
      map.addControl(new window.maplibregl.AttributionControl({compact:true}),'bottom-right');
      map.once('load',()=>{addMarkersAndRoutes(map,'visited');setMapReady(true);});
      mapRef.current=map;
    };
    if(window.maplibregl){initMap();}
    else if(!document.querySelector('[data-ml-js]')){
      const script=document.createElement('script');
      script.src='https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js';

      document.head.appendChild(script);

    return ()=>{
      markersRef.current.forEach(m=>m.remove());
      markersRef.current=[];
      if(mapRef.current){mapRef.current.remove();mapRef.current=null;}

  E(()=>{if(isActive&&mapRef.current)requestAnimationFrame(()=>mapRef.current?.resize());},[isActive]);

  E(()=>{
    const map=mapRef.current;
    if(!map||!mapReady) return;
    if(prevToggleRef.current===toggle) return;
    const prev=prevToggleRef.current;
    prevToggleRef.current=toggle;
    if(toggle==='topo'){
      map.setStyle(TOPO_STYLE());
      map.once('styledata',()=>{
        if(!map.getSource('terrain')){
          map.addSource('terrain',{type:'raster-dem',url:TERRAIN_URL(),tileSize:256});
        }
        map.setTerrain({source:'terrain',exaggeration:1.5});
        if(!map.getLayer('sky')){
          map.addLayer({id:'sky',type:'sky',paint:{
            'sky-type':'atmosphere','sky-atmosphere-sun':[0.0,90.0],
            'sky-atmosphere-sun-intensity':15,
          }});
        }
        map.easeTo({pitch:60,bearing:-20,duration:1200,easing:t=>t<0.5?2*t*t:-1+(4-2*t)*t});
        addMarkersAndRoutes(map,'topo');
      });
    } else if(toggle==='visited'){
      if(prev==='topo'){map.setTerrain(null);map.easeTo({pitch:0,bearing:0,duration:800});
        map.setStyle(OUTDOOR_STYLE());map.once('styledata',()=>addMarkersAndRoutes(map,'visited'));
      } else {addMarkersAndRoutes(map,'visited');}
    } else if(toggle==='wishlist'){
      if(prev==='topo'){map.setTerrain(null);map.easeTo({pitch:0,bearing:0,duration:800});
        map.setStyle(OUTDOOR_STYLE());map.once('styledata',()=>addMarkersAndRoutes(map,'wishlist'));
      } else {addMarkersAndRoutes(map,'wishlist');}
    }
  },[toggle,mapReady,addMarkersAndRoutes]);

  return h('div',{style:{position:'absolute',inset:0}},
    // Map fills full screen — floating nav sits on top
    h('div',{ref:containerRef,style:{position:'absolute',inset:0}}),

    // Minimal status bar backing — just enough for readability

      // Map type dropdown — 1/3 width
      h('div',{ref:dropdownRef,style:{flex:1,position:'relative'}},
        // Trigger button
        h('button',{

          h('span',{style:{fontSize:12,fontWeight:700,fontFamily:FONT_H,color:C.white,

            currentOption.label),

        ),
        // Dropdown list
        dropdownOpen&&h('div',{style:{

          background:'rgba(18,18,28,0.94)',backdropFilter:'blur(24px) saturate(180%)',

// ── Plan: Root controller ─────────────────────────────────────────────────
function PlanScreen(){
  const [view,setView]=S('list'); // 'list' | 'new' | 'detail'
  const [selId,setSelId]=S(null);
  const openDetail=CB((id)=>{setSelId(id);setView('detail');},[]);
  const openNew=CB(()=>setView('new'),[]);
  const goBack=CB(()=>setView('list'),[]);
  if(view==='new') return h(PlanNewView,{onBack:goBack});
  if(view==='detail'){
    const adv=PLAN_ADVENTURES.find(a=>a.id===selId);
    return h(PlanDetailView,{adventure:adv,onBack:goBack});
  }
  return h(PlanListView,{onNew:openNew,onOpen:openDetail});
}

  return h('div',{style:{

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=S('home');
  const [showCreate,setShowCreate]=S(false);
  const [showPremium,setShowPremium]=S(false);
  const [showNotif,setShowNotif]=S(false);
  const [liked,setLiked]=S(new Set());

  const onLike=CB(id=>{
    setLiked(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  },[]);
  const openCreate=CB(()=>setShowCreate(true),[]);
  const openPremium=CB(()=>setShowPremium(true),[]);

  // Bottom nav: 4 tabs only (no create)
  const onTab=CB(t=>setTab(t),[]);

  const showNav=!showCreate&&!showPremium&&!showNotif;

  return h('div',{style:{
    width:390,height:844,borderRadius:50,overflow:'hidden',
    position:'relative',background:C.bg,
    boxShadow:'0 50px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(0,0,0,0.4),inset 0 0 0 1px rgba(255,255,255,0.06)',
    flexShrink:0,
  }},
    // Home — default landing tab
    tab==='home'&&h('div',{style:{position:'absolute',inset:0,zIndex:2}},
      h(HomeScreen,{likedPosts:liked,onLike})
    ),
    // Map — always mounted (hidden via display:none when inactive)
    h('div',{style:{position:'absolute',inset:0,display:tab==='map'?'block':'none',zIndex:1}},
      h(MapScreen,{likedPosts:liked,onLike,isActive:tab==='map',onPremium:openPremium})
    ),
    // Other screens
    tab==='friends'&&h('div',{style:{position:'absolute',inset:0,zIndex:2}},
      h(FriendsScreen,{likedPosts:liked,onLike,
        onNotifications:()=>setShowNotif(true),onOpenCreate:openCreate})
    ),
    tab==='plan'&&h('div',{style:{position:'absolute',inset:0,zIndex:2}},
      h(PlanScreen,{})
    ),
    tab==='profile'&&h('div',{style:{position:'absolute',inset:0,zIndex:2}},
      h(ProfileScreen,{onPremium:openPremium,onOpenCreate:openCreate})
    ),
    // Modals (slide up over everything)
    showCreate&&h('div',{style:{position:'absolute',inset:0,zIndex:100,
      animation:'slideUp 0.35s cubic-bezier(0.32,0.72,0,1)'}},
      h(CreateScreen,{onClose:()=>setShowCreate(false)})
    ),
    showPremium&&h('div',{style:{position:'absolute',inset:0,zIndex:200,
      animation:'slideUp 0.35s cubic-bezier(0.32,0.72,0,1)'}},
      h(PremiumScreen,{onClose:()=>setShowPremium(false)})
    ),
    showNotif&&h('div',{style:{position:'absolute',inset:0,zIndex:150,
      animation:'slideUp 0.35s cubic-bezier(0.32,0.72,0,1)'}},
      h(NotificationsScreen,{onClose:()=>setShowNotif(false)})
    ),
    // Floating bottom nav (hidden when a modal is open)
    showNav&&h(BottomNav,{active:tab,onChange:onTab}),
    h('style',{},'@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}')
  );
}

createRoot(document.getElementById('root')).render(h(React.StrictMode,{},h(App)));
</script>
